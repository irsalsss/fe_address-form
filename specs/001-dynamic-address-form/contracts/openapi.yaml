openapi: 3.1.0
info:
  title: AcmeCorp Address Onboarding API
  version: 1.0.0
  description: >
    Country-aware address capture. Validates and persists addresses for
    USA / AUS / IDN, and exposes per-country field + validation metadata so
    dynamic clients render any supported country without redeploying.

    This document is reconciled against the backend implementation
    (be/src/features/*). The backend registry
    (be/src/features/countries/registry.ts) is the SINGLE SOURCE OF TRUTH for
    field keys + validation; its `.strict()` submit validator rejects unknown
    keys, so payload keys MUST match the registry (never derive them from labels).
servers:
  - url: http://localhost:4000
    description: Local dev (BE default PORT=4000). All routes are under /api/v1.

paths:
  /api/v1/addresses:
    post:
      operationId: createAddress
      summary: Create (validate + persist) an address
      description: >
        Server re-validates `fields` against the country's registry-derived
        strict schema before persisting. Invalid payloads are rejected with 400
        (code BAD_REQUEST) and nothing is stored. Unknown field keys, missing
        required fields, and bad formats/enums all 400. (FR-016, FR-017)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAddressRequest"
      responses:
        "201":
          description: Address stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"
        "400":
          description: >
            Validation failed (unknown key / required missing / format / enum)
            or unsupported country — no row written. Field-level Zod errors are
            in `details` (see ProblemDetails).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    get:
      operationId: listAddresses
      summary: List saved addresses (demo retrieval)
      description: Returns saved addresses with their country and full field set intact. (FR-018, SC-004)
      parameters:
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - in: query
          name: offset
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: Saved addresses (paged)
          content:
            application/json:
              schema:
                type: object
                required: [addresses, limit, offset]
                properties:
                  addresses:
                    type: array
                    items:
                      $ref: "#/components/schemas/Address"
                  limit: { type: integer }
                  offset: { type: integer }

  /api/v1/addresses/{id}:
    get:
      operationId: getAddressById
      summary: Fetch a single saved address
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"
        "404":
          description: No address with that id
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/v1/countries:
    get:
      operationId: listCountries
      summary: List supported countries (code + name)
      responses:
        "200":
          description: Supported countries
          content:
            application/json:
              schema:
                type: object
                required: [countries]
                properties:
                  countries:
                    type: array
                    items:
                      $ref: "#/components/schemas/CountrySummary"

  /api/v1/countries/{code}/fields:
    get:
      operationId: getCountryFields
      summary: Per-country field definitions + validation rules (FR-019)
      description: >
        The dynamic-metadata contract. Returns the ordered field descriptors,
        required flags, dropdown options, and validation rules for one country.
        `label` is plain English (display reference only) — localized clients
        render their own i18n labels keyed by `key`.
      parameters:
        - in: path
          name: code
          required: true
          description: >
            Country code. Canonical alpha-3 (USA/AUS/IDN) or alpha-2 alias
            (US/AU/ID) — both resolve.
          schema: { type: string, example: IDN }
      responses:
        "200":
          description: Country field metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CountryFields"
        "404":
          description: Unsupported country
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

components:
  schemas:
    Country:
      type: string
      enum: [USA, AUS, IDN]

    CountrySummary:
      type: object
      required: [code, name]
      properties:
        code:
          $ref: "#/components/schemas/Country"
        name: { type: string, example: Indonesia }

    FieldOption:
      type: object
      required: [value, label]
      properties:
        value: { type: string, example: DKI Jakarta }
        label: { type: string, example: DKI Jakarta }

    FieldValidation:
      type: object
      description: >
        Validation rules applied to the value. `pattern` (regex source) overrides
        length/numeric when present. Free-text fields default to maxLength 200.
      properties:
        length: { type: integer, minimum: 1, description: exact character length }
        numeric: { type: boolean, description: digits only }
        pattern: { type: string, description: explicit regex source }
        maxLength: { type: integer, minimum: 1 }

    FieldDef:
      type: object
      required: [key, label, required, type, order]
      properties:
        key:
          type: string
          description: >
            Registry key — this IS the submit payload key (e.g. line1, zip,
            street, postalCode). Never derived from the label.
          example: zip
        label:
          type: string
          description: plain-English display reference (clients localize via key)
          example: ZIP Code
        required: { type: boolean }
        type:
          type: string
          enum: [text, dropdown]
        options:
          type: array
          description: present when type=dropdown
          items:
            $ref: "#/components/schemas/FieldOption"
        validation:
          $ref: "#/components/schemas/FieldValidation"
        order:
          type: integer
          minimum: 0
          description: render order (0-based); order is significant

    CountryFields:
      type: object
      required: [code, name, fields]
      properties:
        code:
          $ref: "#/components/schemas/Country"
        name: { type: string }
        fields:
          type: array
          description: ordered field descriptors
          items:
            $ref: "#/components/schemas/FieldDef"

    # --- Per-country submitted field shapes ---
    # Keys MUST match the backend registry (be/src/features/countries/registry.ts),
    # from which the .strict() submit validator is derived. additionalProperties:false
    # mirrors that strictness (unknown keys 400).
    UsaFields:
      type: object
      required: [line1, city, state, zip]
      properties:
        line1: { type: string, minLength: 1, description: Address Line 1 }
        line2: { type: string, description: Address Line 2 }
        city: { type: string, minLength: 1 }
        state: { type: string, description: 2-letter US state/DC code }
        zip: { type: string, pattern: "^\\d{5}$", description: ZIP Code }
      additionalProperties: false

    AusFields:
      type: object
      required: [line1, suburb, state, postcode]
      properties:
        line1: { type: string, minLength: 1, description: Address Line 1 }
        line2: { type: string, description: Address Line 2 }
        suburb: { type: string, minLength: 1 }
        state:
          type: string
          enum: [NSW, VIC, QLD, WA, SA, TAS, ACT, NT]
        postcode: { type: string, pattern: "^\\d{4}$" }
      additionalProperties: false

    IdnFields:
      type: object
      required: [province, city, district, postalCode, street]
      properties:
        province: { type: string, description: Indonesian province name }
        city: { type: string, minLength: 1, description: City / Regency }
        district: { type: string, minLength: 1, description: Kecamatan }
        village: { type: string, description: Kelurahan/Desa }
        postalCode: { type: string, pattern: "^\\d{5}$" }
        street: { type: string, minLength: 1, description: Street Address }
      additionalProperties: false

    CreateAddressRequest:
      type: object
      required: [country, fields]
      description: >
        Backend body schema is `{ country, fields }`; `fields` is parsed by the
        country's strict registry validator. Any extra top-level properties
        (e.g. googlePlaceId) are accepted but stripped — not persisted.
      properties:
        country:
          type: string
          description: USA/AUS/IDN (or alias US/AU/ID)
          example: IDN
        fields:
          oneOf:
            - $ref: "#/components/schemas/UsaFields"
            - $ref: "#/components/schemas/AusFields"
            - $ref: "#/components/schemas/IdnFields"
          description: shape MUST match the discriminating country

    Address:
      type: object
      required: [id, country, fields, createdAt]
      properties:
        id:
          type: string
          format: uuid
        country:
          $ref: "#/components/schemas/Country"
        fields:
          oneOf:
            - $ref: "#/components/schemas/UsaFields"
            - $ref: "#/components/schemas/AusFields"
            - $ref: "#/components/schemas/IdnFields"
        createdAt:
          type: string
          format: date-time

    ProblemDetails:
      type: object
      description: >
        problem+json error body (be/src/shared/http/problem.ts). Validation
        failures are status 400 / code BAD_REQUEST with the Zod `flatten()`
        output under `details` ({ formErrors, fieldErrors }). There is no
        top-level `errors[]` array.
      required: [type, title, status, code]
      properties:
        type: { type: string, default: about:blank }
        title: { type: string, description: same as code, example: BAD_REQUEST }
        status: { type: integer, example: 400 }
        detail: { type: string, example: validation failed }
        instance: { type: string, description: request url }
        code:
          type: string
          enum: [BAD_REQUEST, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, CONFLICT, INTERNAL]
        details:
          description: >
            Error-specific payload. For body validation it is the Zod flatten:
            { formErrors: string[], fieldErrors: Record<key, string[]> }.
          type: object
          additionalProperties: true
          example:
            formErrors: []
            fieldErrors:
              zip: ["Invalid"]
              street: ["Required"]
